    abbreviation: "PP"

# Database-Specific Settings
database_settings:
  # Batch sizes for different database systems
  batch_sizes:
    postgresql: 50000
    sql_server: 25000
    oracle: 10000
    redshift: 50000
    snowflake: 50000
    spark: 100000
    duckdb: 50000
    allofus: 50000
    default: 10000
    
  # Page sizes for data collection
  page_sizes:
    large_query: 50000
    medium_query: 20000
    small_query: 10000
    
  # Date difference functions by database
  date_diff_functions:
    postgresql: "DATE_PART('day', {date1} - {date2})"
    sql_server: "DATEDIFF(day, {date2}, {date1})"
    oracle: "({date1} - {date2})"
    redshift: "DATEDIFF(day, {date2}, {date1})"
    snowflake: "DATEDIFF('day', {date2}, {date1})"
    spark: "DATEDIFF({date1}, {date2})"
    duckdb: "DATE_DIFF('day', {date2}, {date1})"
    
  # Date arithmetic by database
  date_add_days:
    postgresql: "{date} + INTERVAL '{days} days'"
    sql_server: "DATEADD(day, {days}, {date})"
    oracle: "{date} + {days}"
    redshift: "DATEADD(day, {days}, {date})"
    snowflake: "DATEADD('day', {days}, {date})"
    spark: "DATE_ADD({date}, {days})"
    duckdb: "{date} + INTERVAL {days} DAY"

# Algorithm Parameters
algorithm_parameters:
  # Age limits for pregnancy
  min_age: 15
  max_age: 56
  
  # Episode duration limits (in days)
  min_episode_duration: 30
  max_episode_duration: 365  # ~12 months
  
  # Buffer days for various calculations
  overlap_buffer_days: 14
  merge_buffer_days: 7
  lookback_window_days: 14
  lookahead_months: 11
  
  # Gestational age limits (in weeks)
  min_gestational_weeks: 0
  max_gestational_weeks: 44
  
  # Precision thresholds (in days)
  high_precision_days: 7
  medium_precision_days: 30
  
  # Quality thresholds
  min_concepts_for_episode: 2
  min_overlapping_percent: 50
  
  # Invalid values to filter
  invalid_gestational_value: 9999999
  invalid_date_placeholder: "2999-01-01"
